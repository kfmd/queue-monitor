<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — Monitoring Antrean RSU Islam Klaten</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone untuk JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
  <div id="root">
    <!-- Splash sementara -->
    <div style="
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#0f3460,#533483,#0d7c66);
      color:#fff;
      font-family:'DM Sans',system-ui,sans-serif;
      flex-direction:column;
      gap:0.75rem;
    ">
      <div style="font-size:2.5rem">🔐</div>
      <div style="font-size:1rem;opacity:0.9">Memuat panel admin…</div>
    </div>
  </div>

  <!-- Database IndexedDB -->
  <script src="js/db.js"></script>

  <!-- Lapisan data (sama dengan dashboard) -->
  <script src="js/data.js"></script>

  <!-- Panel admin React -->
  <script type="text/babel" src="js/admin.js"></script>
</body>
</html>
