<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitoring Antrean — Humas RSU Islam Klaten</title>
  <meta name="description" content="Dashboard monitoring permintaan desain, video, dan cetak Humas RSU Islam Klaten" />

  <!-- Ikon browser tab -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>" />

  <!-- ── CSS ─────────────────────────────────────────── -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- ── Chart.js ────────────────────────────────────── -->
  <!-- Library untuk menampilkan grafik bar bulanan -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <!-- ── React ───────────────────────────────────────── -->
  <!-- React untuk membangun antarmuka interaktif -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- ── Babel Standalone ────────────────────────────── -->
  <!-- Babel mengubah kode JSX (React) menjadi JavaScript biasa -->
  <!-- ⚠ Untuk produksi besar, gunakan Create React App atau Vite -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
  <!-- React akan merender seluruh aplikasi di sini -->
  <div id="root">
    <!-- Tampilan awal saat JavaScript belum selesai dimuat -->
    <div style="
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      background:#0f3460;
      color:#fff;
      font-family:'DM Sans',system-ui,sans-serif;
      gap:1rem;
    ">
      <div style="font-size:3rem">🏥</div>
      <div style="font-size:1.1rem;font-weight:600;opacity:0.9">Memuat dashboard…</div>
      <div style="
        width:40px;height:40px;
        border:3px solid rgba(255,255,255,0.2);
        border-top-color:#fff;
        border-radius:50%;
        animation:spin 0.75s linear infinite;
      "></div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
  </div>

  <!-- ─────────────────────────────────────────────────────── -->
  <!-- URUTAN PEMUATAN SKRIP PENTING:                          -->
  <!-- 1. data.js harus dimuat lebih dulu (tanpa type="text/babel") -->
  <!-- 2. app.js dimuat setelah, dengan type="text/babel" untuk JSX  -->
  <!-- ─────────────────────────────────────────────────────── -->

  <!-- Database IndexedDB (harus dimuat sebelum data.js) -->
  <script src="js/db.js"></script>

  <!-- Lapisan data (konfigurasi, fetch, cache) -->
  <script src="js/data.js"></script>

  <!-- Aplikasi React utama (menggunakan JSX, diproses Babel) -->
  <script type="text/babel" src="js/app.js"></script>
</body>
</html>
